<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>mingyang zone</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 2rem 1rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 标题样式 */
        .page-title {
            text-align: center;
            color: #2d3748;
            margin-bottom: 2rem;
            font-size: 2.2rem;
            font-weight: 600;
        }

        /* 搜索框容器 */
        .search-container {
            width: 100%;
            margin-bottom: 2.5rem;
        }

        #search-input {
            width: 100%;
            padding: 1rem 1.5rem;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            box-shadow: 0 2px 15px rgba(0, 0, 0, 0.1);
            outline: none;
            transition: all 0.3s ease;
        }

        #search-input:focus {
            box-shadow: 0 4px 20px rgba(66, 135, 245, 0.2);
            transform: translateY(-2px);
        }

        /* 链接卡片网格 */
        .links-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        /* 链接卡片样式 */
        .link-card {
            background: white;
            padding: 1.5rem;
            border-radius: 12px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            text-decoration: none;
            color: #2d3748;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        .link-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        .link-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: #4285f5;
        }

        .link-desc {
            font-size: 0.9rem;
            color: #718096;
            line-height: 1.5;
        }

        /* 无结果提示 */
        .no-result {
            text-align: center;
            grid-column: 1 / -1;
            padding: 3rem 0;
            color: #718096;
            font-size: 1.1rem;
        }

        /* 隐藏元素 */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <h1 class="page-title">我的收藏链接</h1>

    <!-- 搜索框 -->
    <div class="search-container">
        <input type="text" id="search-input" placeholder="搜索链接名称...">
    </div>

    <!-- 链接卡片容器 -->
    <div class="links-container" id="links-container">
        <!-- 这里是示例链接，你可以自由增删改 -->
        <a href="https://mubucm.com/doc/3bXbpF-Yz0O" class="link-card" data-name="mubu-测试">
            <div class="link-title">测试</div>
            <div class="link-desc">mubu-测试</div>
        </a>

        <a href="https://www.bilibili.com" class="link-card" data-name="哔哩哔哩">
            <div class="link-title">哔哩哔哩</div>
            <div class="link-desc">年轻人喜爱的动漫、游戏、学习、娱乐视频平台</div>
        </a>

        <a href="https://github.com" class="link-card" data-name="GitHub">
            <div class="link-title">GitHub</div>
            <div class="link-desc">全球最大的代码托管平台，开源项目聚集地</div>
        </a>

        <a href="https://www.zhihu.com" class="link-card" data-name="知乎">
            <div class="link-title">知乎</div>
            <div class="link-desc">中文互联网高质量问答社区，分享知识经验</div>
        </a>

        <a href="https://www.163.com" class="link-card" data-name="网易邮箱">
            <div class="link-title">网易邮箱</div>
            <div class="link-desc">稳定安全的免费邮箱服务，支持大容量存储</div>
        </a>

        <a href="https://www.taobao.com" class="link-card" data-name="淘宝网">
            <div class="link-title">淘宝网</div>
            <div class="link-desc">中国大型网购平台，海量商品随心选</div>
        </a>
    </div>

    <script>
        // 获取DOM元素
        const searchInput = document.getElementById('search-input');
        const linkCards = document.querySelectorAll('.link-card');
        const container = document.getElementById('links-container');

        // 搜索功能
        searchInput.addEventListener('input', function(e) {
            const searchText = e.target.value.toLowerCase().trim();
            
            // 遍历所有卡片
            linkCards.forEach(card => {
                const linkName = card.getAttribute('data-name').toLowerCase();
                
                // 匹配则显示，不匹配则隐藏
                if (linkName.includes(searchText)) {
                    card.classList.remove('hidden');
                } else {
                    card.classList.add('hidden');
                }
            });

            // 检查是否有可见卡片，无结果则显示提示
            const visibleCards = document.querySelectorAll('.link-card:not(.hidden)');
            const noResultEl = document.getElementById('no-result');
            
            // 移除旧的无结果提示
            if (noResultEl) noResultEl.remove();
            
            // 无结果时添加提示
            if (visibleCards.length === 0) {
                const noResult = document.createElement('div');
                noResult.id = 'no-result';
                noResult.className = 'no-result';
                noResult.textContent = '未找到匹配的链接，请更换关键词';
                container.appendChild(noResult);
            }
        });
    </script>
</body>
</html>
